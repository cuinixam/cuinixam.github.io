pipeline:
  - step: CreateVEnv
    module: pypeline.steps.create_venv
    config:
      package_manager: uv>=0.6
      python_version: 3.13
  - step: GenerateEnvSetupScript
    module: pypeline.steps.env_setup_script
  - step: PreCommit
    run: pre-commit run --all-files
  - step: PyTest
    run: pytest
  - step: BuildDocs
    run: sphinx-build -E -a docs build/docs
  - step: BuildLanding
    run: jarvis landing --timeline-file docs/timeline.json --presentations-file docs/presentations.json --presentations-dir docs/presentations --teaching-file docs/teaching.json --notebooks-dir docs/notebooks --output-dir build/docs
